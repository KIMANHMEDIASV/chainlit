name: Trigger auto deployment for chainlit-rx5rmrqv7m-web

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/chainlit-rx5rmrqv7m-web-AutoDeployTrigger-f4b7118e-c4f4-4ef5-a61c-4460b6346be9.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CHAINLITRX5RMRQV7MWEB_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CHAINLITRX5RMRQV7MWEB_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CHAINLITRX5RMRQV7MWEB_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: crrx5rmrqv7md7m.azurecr.io
          registryUsername: ${{ secrets.CHAINLITRX5RMRQV7MWEB_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CHAINLITRX5RMRQV7MWEB_REGISTRY_PASSWORD }}
          containerAppName: chainlit-rx5rmrqv7m-web
          resourceGroup: rg-chainlit
          imageToBuild: crrx5rmrqv7md7m.azurecr.io/chainlit-rx5rmrqv7m-web:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


